<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horizon · Tareas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

  :root{
    --page-bg:#d8d5ca; --grid:rgba(255,255,255,0.55);
    --surface-1:#f3f1ea; --surface-2:#ffffff;
    --border:rgba(0,0,0,0.09); --border-strong:rgba(0,0,0,0.15);
    --text-primary:#2c2c2a; --text-secondary:#5f5e5a; --text-muted:#8a8980;
    --accent:#46a178; --accent-hover:#2f7d5a; --accent-soft:rgba(70,161,120,0.12);
    --accent-2:#6dbf99; --mint:#e9f4ee;
    --gold:#e0a52e; --gold-deep:#b07d17; --gold-soft:rgba(224,165,46,0.14);
    --blue:#5b7fa6; --blue-soft:rgba(91,127,166,0.14);
    --green:#46a178; --green-soft:rgba(70,161,120,0.12);
    --brown:#b3814a; --slate:#9aa3a0;
    --danger:#cf5b5b; --danger-soft:rgba(207,91,91,0.12);
  }
  [data-theme="dark"]{
    --page-bg:#15150f; --grid:rgba(255,255,255,0.05);
    --surface-1:#222220; --surface-2:#2b2b27;
    --border:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.18);
    --text-primary:#f1efe8; --text-secondary:#b4b2a9; --text-muted:#8a8980;
    --accent:#5cb98c; --accent-hover:#7fcfa6; --accent-soft:rgba(92,185,140,0.16);
    --accent-2:#5cb98c; --mint:rgba(92,185,140,0.10);
    --gold:#e6b347; --gold-deep:#e6b347; --gold-soft:rgba(230,179,71,0.16);
    --blue:#7c9cc0; --blue-soft:rgba(124,156,192,0.18);
    --green:#5cb98c; --green-soft:rgba(92,185,140,0.16);
    --danger:#df7373; --danger-soft:rgba(223,115,115,0.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    font-weight:400;line-height:1.6;
    background-color:var(--page-bg);color:var(--text-primary);min-height:100vh;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:38px 38px;
    -webkit-font-smoothing:antialiased;transition:background-color .2s,color .2s;
  }

  /* ── HEADER ── */
  header{
    background:var(--surface-2);border-bottom:0.5px solid var(--border);
    padding:0 24px;height:60px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:30;
  }
  .brand{display:flex;align-items:center;gap:11px}
  .hex{
    width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:500;font-size:14px;background:var(--accent);
    clip-path:polygon(50% 0,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  }
  .brand-name{font-size:16px;font-weight:500;color:var(--text-primary)}
  .brand-sep{color:var(--border-strong);font-weight:400;font-size:16px}
  .brand-sub{font-size:14px;font-weight:400;color:var(--text-muted)}
  .header-right{display:flex;align-items:center;gap:12px}
  .user-pill{font-size:13px;color:var(--text-secondary);font-weight:400}
  .btn-theme{
    background:var(--surface-1);border:0.5px solid var(--border);border-radius:8px;
    padding:7px 12px;font-size:13px;font-family:inherit;color:var(--text-secondary);cursor:pointer;transition:border-color .15s;
  }
  .btn-theme:hover{border-color:var(--border-strong)}
  .btn-add{
    display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;
    border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:500;
    cursor:pointer;transition:background .2s;font-family:inherit;
  }
  .btn-add:hover{background:var(--accent-hover)}
  .btn-add .plus{font-size:15px;line-height:1;margin-top:-1px}

  /* ── CONTEXT BAND ── */
  .band{
    max-width:1120px;margin:0 auto;padding:30px 16px 6px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .band-l .eyebrow{font-size:13px;color:var(--text-muted);font-weight:400}
  .band-l h1{font-size:22px;font-weight:500;line-height:1.2;margin-top:4px}
  .band-l .meta{margin-top:6px;font-size:14px;color:var(--text-secondary)}
  .band-l .meta b{color:var(--text-primary);font-weight:500}

  /* segmented toggle */
  .toggle{display:inline-flex;background:var(--surface-1);border:0.5px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .toggle button{
    border:none;background:transparent;color:var(--text-muted);font-size:13px;font-weight:400;
    padding:8px 16px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:inherit;
  }
  .toggle button.active{background:var(--surface-2);color:var(--text-primary);border:0.5px solid var(--border)}

  /* ── QUICK ADD ── */
  .wrap{max-width:1120px;margin:0 auto;padding:14px 16px 70px}
  .searchbar{
    background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;
    padding:8px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;transition:border-color .15s;
  }
  .searchbar:focus-within{border-color:var(--accent)}
  .searchbar .s-ico{font-size:14px;opacity:.6;flex:0 0 auto}
  .searchbar .s-input{flex:1 1 auto;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--text-primary);background:transparent;padding:4px 0}
  .searchbar .s-input::placeholder{color:var(--text-muted)}
  .searchbar .s-clear{border:none;background:var(--surface-1);color:var(--text-secondary);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;flex:0 0 auto;line-height:1}
  .searchbar .s-clear:hover{background:var(--border)}
  .quickadd{
    background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;
    padding:8px 8px 8px 16px;display:flex;align-items:center;gap:10px;margin-bottom:22px;
  }
  .quickadd .qa-plus{color:var(--text-muted);font-size:18px;font-weight:400;flex:0 0 auto}
  .quickadd input.qa-title{
    flex:1 1 auto;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text-primary);
    background:transparent;padding:8px 0;
  }
  .quickadd input.qa-title::placeholder{color:var(--text-muted)}
  .qa-field{
    border:0.5px solid var(--border);background:var(--surface-1);border-radius:8px;
    font-size:13px;font-family:inherit;color:var(--text-secondary);padding:9px 12px;outline:none;
    cursor:pointer;transition:border-color .15s;
  }
  .qa-field:focus{border-color:var(--accent)}
  .qa-go{
    background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 18px;
    font-size:13px;font-weight:500;cursor:pointer;transition:background .2s;flex:0 0 auto;font-family:inherit;
  }
  .qa-go:hover{background:var(--accent-hover)}
  .qa-hint{font-size:12px;color:var(--text-muted);margin:-14px 4px 22px;display:flex;gap:6px;align-items:center}

  /* ── TASK CARD ── */
  .group-label{
    font-size:13px;font-weight:500;color:var(--text-secondary);
    margin:22px 4px 12px;display:flex;align-items:center;gap:8px;
  }
  .group-label .count{
    background:var(--surface-1);color:var(--text-secondary);border-radius:6px;
    font-size:12px;font-weight:400;padding:2px 9px;
  }
  .group-label .ava{
    width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:500;color:#fff;
  }
  .task{
    background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;
    padding:13px 16px;display:flex;align-items:center;gap:13px;
    margin-bottom:8px;transition:border-color .15s;
  }
  .task:hover{border-color:var(--border-strong)}
  .check{
    width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border-strong);flex:0 0 auto;
    cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
  }
  .check:hover{border-color:var(--accent)}
  .task.done .check{background:var(--accent);border-color:var(--accent)}
  .task.done .check::after{content:"✓";color:#fff;font-size:12px}
  /* flash al completar, antes de bajar a Completadas */
  .task.completing{border-color:var(--accent);background:var(--accent-soft);transition:all .2s}
  .task.completing .check{background:var(--accent);border-color:var(--accent)}
  .task.completing .check::after{content:"✓";color:#fff;font-size:12px}
  .task.completing .task-title{color:var(--accent-hover);text-decoration:line-through}
  .task-body{flex:1 1 auto;min-width:0}
  .task-title{font-size:14px;font-weight:400;color:var(--text-primary);line-height:1.4}
  .task.done .task-title{color:var(--text-muted);text-decoration:line-through}
  .task-sub{display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap}
  .ava{border-radius:50%}
  .resp{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:400;color:var(--text-secondary);
  }
  .resp .ava{
    width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:500;color:#fff;
  }
  .chip{
    font-size:12px;font-weight:400;padding:2px 9px;border-radius:6px;white-space:nowrap;
  }
  .chip.date{background:var(--surface-1);color:var(--text-secondary)}
  .chip.date.today{background:var(--gold-soft);color:var(--gold-deep)}
  .chip.date.over{background:var(--danger-soft);color:var(--danger)}
  .estado{
    font-size:12px;font-weight:400;padding:3px 10px;border-radius:6px;white-space:nowrap;
    margin-left:auto;flex:0 0 auto;
  }
  .estado.pendiente{background:var(--surface-1);color:var(--text-secondary)}
  .estado.curso{background:var(--blue-soft);color:var(--blue)}
  .estado.esperando{background:var(--gold-soft);color:var(--gold-deep)}
  .estado.hecha{background:var(--accent-soft);color:var(--accent-hover)}
  .origen-dot{
    font-size:11px;color:var(--text-muted);font-weight:400;display:inline-flex;align-items:center;gap:4px;
  }
  .origen-dot::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--border-strong)}

  .draft-flag{
    max-width:1120px;margin:18px auto 0;padding:10px 16px;background:var(--gold-soft);
    border:0.5px solid var(--border);border-radius:10px;color:var(--gold-deep);font-size:13px;font-weight:400;
    display:flex;align-items:center;gap:8px;
  }
  .empty{color:var(--text-muted);font-size:14px;padding:30px 4px;text-align:center}
  .group-label.done-label{color:var(--text-muted);margin-top:30px;border-top:0.5px solid var(--border);padding-top:20px}
  .group-label.done-label .archive-hint{font-size:12px;font-weight:400;color:var(--text-muted);margin-left:2px}

  /* ── LOGIN / GATE ── */
  .login-screen{position:fixed;inset:0;background:var(--page-bg);display:flex;align-items:center;justify-content:center;z-index:60}
  .login-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:16px;padding:40px 44px;text-align:center;max-width:380px}
  .login-card .hex{margin:0 auto 18px}
  .login-card h2{font-size:20px;font-weight:500;color:var(--text-primary)}
  .login-card p{font-size:14px;color:var(--text-secondary);margin-top:6px}
  .login-card .msg{font-size:13px;color:var(--danger);margin-top:14px;font-weight:400}
  .btn-google{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:500;cursor:pointer;margin-top:24px;transition:background .2s;font-family:inherit}
  .btn-google:hover{background:var(--accent-hover)}
  .btn-logout{background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:400;color:var(--text-secondary);cursor:pointer;transition:all .15s;font-family:inherit}
  .btn-logout:hover{border-color:var(--border-strong);color:var(--text-primary)}

  /* ── DASHBOARD ── */
  .kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin:6px 0 22px}
  .kpi{padding:16px 18px;border-right:0.5px solid var(--border)}
  .kpi:last-child{border-right:none}
  .kpi-label{font-size:13px;font-weight:400;color:var(--text-secondary)}
  .kpi-val{font-size:24px;font-weight:500;color:var(--text-primary);line-height:1.2;margin-top:6px;letter-spacing:-.01em}
  .kpi-sub{font-size:13px;color:var(--text-muted);margin-top:6px}
  .kpi-bar{height:6px;border-radius:6px;background:var(--surface-1);margin-top:10px;overflow:hidden}
  .kpi-bar span{display:block;height:100%;border-radius:6px}

  /* ── BLOQUE COMERCIAL (snapshot CRM) ── */
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:6px 2px 12px}
  .sec-head.spaced{margin-top:26px}
  .sec-title{font-size:16px;font-weight:500;color:var(--text-primary)}
  .sec-note{font-size:12px;color:var(--text-muted)}
  .sec-note a{color:var(--accent-hover);text-decoration:none}
  .sec-note a:hover{text-decoration:underline}
  .sec-note .live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
  .kpi-strip.crm{grid-template-columns:repeat(3,1fr)}
  @media(max-width:720px){.kpi-strip.crm{grid-template-columns:repeat(2,1fr)}}

  .proy-list{display:flex;flex-direction:column;gap:14px}
  .proy{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:18px 20px;transition:border-color .2s}
  .proy.hl{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .proy-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .proy-name{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:500;color:var(--text-primary);flex:1 1 auto;min-width:0}
  .proy-bar-accent{width:4px;height:18px;border-radius:4px;flex:0 0 auto}
  .proy-team{display:flex;align-items:center}
  .proy-team .ava{width:24px;height:24px;font-size:10px;margin-left:-6px;border:2px solid var(--surface-2)}
  .proy-team .ava:first-child{margin-left:0}
  .proy-metrics{display:grid;grid-template-columns:1fr 1.4fr;gap:24px;margin-bottom:8px}
  .metric-top{display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);margin-bottom:7px}
  .metric-top b{color:var(--text-primary);font-weight:500}
  .prog{height:8px;border-radius:6px;background:var(--surface-1);overflow:hidden;position:relative}
  .prog span{display:block;height:100%;border-radius:6px;transition:width .4s}
  .prog.time span{background:var(--slate)}
  .prog.time .hoy{position:absolute;top:-3px;width:2px;height:14px;background:var(--text-secondary);transform:translateX(-1px)}
  .prog.time .hoy::after{content:"hoy";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:400;color:var(--text-secondary)}

  .proy-rows{margin-top:14px;border-top:0.5px solid var(--border);padding-top:6px}
  .d-row{display:grid;grid-template-columns:1fr 44px 70px 110px;align-items:center;gap:10px;padding:9px 2px;border-bottom:0.5px solid var(--border)}
  .d-row:last-child{border-bottom:none}
  .d-row.done .d-task{color:var(--text-muted);text-decoration:line-through}
  .d-task{font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:9px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .d-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .d-dot.pendiente{background:var(--border-strong)}.d-dot.curso{background:var(--blue)}.d-dot.esperando{background:var(--gold)}.d-dot.hecha{background:var(--accent)}
  .d-fecha{font-size:13px;color:var(--text-secondary)}
  .d-resp .ava{width:22px;height:22px;font-size:10px}
  /* ── FOCO DE HOY ── */
  .foco{margin:0 0 30px}
  .foco-head{display:flex;align-items:center;gap:12px;margin:2px 4px 16px}
  .foco-eyebrow{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .foco-eyebrow .ico{font-size:15px}
  .foco-pill{background:var(--accent);color:#fff;font-size:12px;font-weight:400;padding:4px 12px;border-radius:6px}
  .foco-cap{margin-left:auto;display:inline-flex;background:var(--surface-1);border:0.5px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .foco-cap button{border:none;background:transparent;color:var(--text-muted);font-size:13px;font-weight:400;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:inherit}
  .foco-cap button.active{background:var(--surface-2);color:var(--text-primary);border:0.5px solid var(--border)}
  .foco-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:15px 18px;display:flex;align-items:flex-start;gap:14px;margin-bottom:9px;transition:border-color .15s,opacity .25s,transform .12s}
  .foco-card:hover{border-color:var(--border-strong)}
  .foco-card.gone{opacity:0;transform:translateX(14px)}
  .foco-dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;margin-top:5px}
  .foco-dot.red{background:var(--danger)}.foco-dot.amber{background:var(--gold)}.foco-dot.blue{background:var(--blue)}.foco-dot.gray{background:var(--text-muted)}
  .foco-body{flex:1 1 auto;min-width:0}
  .foco-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .foco-title{font-size:15px;font-weight:500;color:var(--text-primary)}
  .foco-tag{font-size:12px;font-weight:400;padding:3px 10px;border-radius:6px;white-space:nowrap}
  .foco-tag.red{background:var(--danger-soft);color:var(--danger)}.foco-tag.amber{background:var(--gold-soft);color:var(--gold-deep)}.foco-tag.blue{background:var(--blue-soft);color:var(--blue)}.foco-tag.gray{background:var(--surface-1);color:var(--text-secondary)}
  .foco-carry{font-size:11px;font-weight:400;color:var(--text-muted);display:inline-flex;align-items:center;gap:3px}
  .foco-carry::before{content:"⤵"}
  .foco-why{font-size:14px;color:var(--text-secondary);line-height:1.5;margin-top:6px}
  .foco-why b{color:var(--text-primary);font-weight:500}
  .foco-meta{display:flex;align-items:center;gap:8px;margin-top:9px}
  .foco-meta .ava{width:21px;height:21px;font-size:10px}
  .foco-proj{font-size:13px;font-weight:400;color:var(--text-muted)}
  .foco-actions{flex:0 0 auto;align-self:center;display:flex;align-items:center;gap:6px}
  .btn-done{display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s;white-space:nowrap;font-family:inherit}
  .btn-done:hover{background:var(--accent-hover)}
  .x-foco{background:transparent;border:none;color:var(--text-muted);font-size:15px;cursor:pointer;padding:5px 7px;border-radius:6px;line-height:1;transition:all .15s}
  .x-foco:hover{background:var(--surface-1);color:var(--text-primary)}
  .foco-sugg{background:var(--surface-2);border:0.5px dashed var(--border-strong);border-radius:12px;padding:13px 18px;margin-top:2px}
  .foco-sugg-head{font-size:13px;font-weight:400;color:var(--text-muted);margin-bottom:8px}
  .sugg-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:0.5px solid var(--border)}
  .sugg-row:first-of-type{border-top:none}
  .sugg-title{flex:1 1 auto;font-size:13px;color:var(--text-primary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sugg-row .ava{width:20px;height:20px;font-size:10px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500}
  .btn-sumar{background:var(--surface-1);border:0.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:400;color:var(--text-primary);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
  .btn-sumar:hover{border-color:var(--accent);color:var(--accent)}

// ─── DATA (CRUD contra Supabase) ───
async function loadTareas(){
  if(DEMO){ render(); return; }
  const { data, error } = await _sb.from('tareas').select('*').order('created_at',{ascending:false});
  if(error){ console.error('loadTareas:', error); tareas=[]; }

const AVA = { 'yo':'#46a178','Fede':'#5b7fa6','Juampi':'#b3814a','Lucas':'#9aa3a0' };
const ESTADO_CLASS = {'pendiente':'pendiente','en curso':'curso','esperando respuesta':'esperando','hecha':'hecha'};
const ESTADO_LABEL = {'pendiente':'Pendiente','en curso':'En curso','esperando respuesta':'Esperando','hecha':'Hecha'};
let view = 'dia';
let searchQuery = '';

// ─── BUSCADOR GENERAL ───
function onSearch(v){
  searchQuery = (v||'').trim().toLowerCase();
  document.getElementById('s-clear').style.display = searchQuery ? 'flex' : 'none';
  render();
}
function clearSearch(){ const i=document.getElementById('search'); if(i) i.value=''; onSearch(''); }
function matchSearch(t){
  const hay = [t.titulo, respLabel(t.responsable), t.proyecto, t.notas, ESTADO_LABEL[t.estado]]
    .filter(Boolean).join(' ').toLowerCase();
  return hay.includes(searchQuery);
}
function renderSearch(c){
  document.getElementById('band-title').textContent='Búsqueda';
  const res = tareas.filter(matchSearch).sort(sortByDeadline);
  const arch = res.filter(isArchived).length;
  document.getElementById('band-meta').innerHTML =
    `<b>${res.length}</b> resultado${res.length===1?'':'s'} para "${searchQuery}"${arch?` · ${arch} en archivo`:''}`;
  c.innerHTML = res.length ? res.map(taskRow).join('') : `<div class="empty">Sin resultados para "${searchQuery}" 🔍</div>`;
}

function ava(name, big){
  const label = name==='yo' ? 'MT' : name.slice(0,2).toUpperCase();
  return `<span class="ava" style="background:${AVA[name]||'#9aa3a0'};${big?'':''}">${label}</span>`;
}
function respLabel(name){ return name==='yo' ? 'Yo' : name; }

function dateChip(d){
  if(!d) return '';
  let cls='date', txt=fmt(d);
  if(d < TODAY) cls='date over';
  else if(d === TODAY){ cls='date today'; txt='Hoy'; }
  return `<span class="chip ${cls}">${txt}</span>`;
}
function fmt(d){
  const [y,m,day]=d.split('-'); const mm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${mm[parseInt(m)-1]}`;
}

function taskRow(t){
  return `<div class="task ${t.estado==='hecha'?'done':''}" data-id="${t.id}" ondblclick="openDash('${(t.proyecto||'').replace(/'/g,"\\'")}')" title="Doble-click: ver en Dashboard">
    <div class="check" onclick="toggleDone('${t.id}')"></div>
    <div class="task-body">
      <div class="task-title">${t.titulo}</div>
      <div class="task-sub">
        <span class="resp">${ava(t.responsable)} ${respLabel(t.responsable)}</span>
        ${dateChip(t.deadline)}
        ${t.origen!=='manual'?`<span class="origen-dot">${t.origen}</span>`:''}
        ${t.notas?`<span class="origen-dot">📝 ${t.notas}</span>`:''}
      </div>
    </div>
    <span class="estado ${ESTADO_CLASS[t.estado]}">${ESTADO_LABEL[t.estado]}</span>
  </div>`;
}

let highlightProy = null;
function openDash(proy){ highlightProy = proy||null; setView('dash'); }

// completadas: quedan visibles ARCHIVE_DIAS días y después se archivan (se ocultan)
const ARCHIVE_DIAS = 5;
function isArchived(t){
  if(t.estado!=='hecha') return false;
  if(!t.completed_at) return true;                                  // completada vieja sin fecha → archivada
  return (Date.now() - new Date(t.completed_at).getTime())/86400000 >= ARCHIVE_DIAS;
}
function completadaHace(t){
  if(!t.completed_at) return '';
  const d = Math.floor((Date.now() - new Date(t.completed_at).getTime())/86400000);
  return d<=0 ? 'hoy' : `hace ${d} día${d>1?'s':''}`;
}
function completedSection(done){
  if(!done.length) return '';
  const sorted = [...done].sort((a,b)=>String(b.completed_at||'').localeCompare(String(a.completed_at||'')));
  return `<div class="group-label done-label">✓ Completadas <span class="count">${done.length}</span><span class="archive-hint">se archivan a los ${ARCHIVE_DIAS} días</span></div>
          ${sorted.map(taskRow).join('')}`;
}
function render(){
  const c = document.getElementById('content');
  if(searchQuery){ renderSearch(c); return; }
  if(view==='dash'){ renderDashboard(c); return; }
  if(view==='archivo'){ renderArchivo(c); return; }
  const vivas = tareas.filter(t=>!isArchived(t));
  if(view==='dia'){
    document.getElementById('band-title').textContent='Mi día';
    const mine = vivas.filter(t=>t.es_mia);
    const open = mine.filter(t=>t.estado!=='hecha').sort(sortByDeadline);
    const done = mine.filter(t=>t.estado==='hecha');
    document.getElementById('band-meta').innerHTML = `<b>${open.length}</b> pendientes · ${done.length} completada${done.length===1?'':'s'} a la vista`;
    c.innerHTML = (open.length||done.length)
      ? open.map(taskRow).join('') + completedSection(done)
      : `<div class="empty">Nada para hoy 🎉</div>`;
  } else {
    document.getElementById('band-title').textContent='Por persona';
    const people = [...new Set(vivas.map(t=>t.responsable))];
    const totalOpen = vivas.filter(t=>t.estado!=='hecha').length;
    document.getElementById('band-meta').innerHTML = `<b>${people.length}</b> personas · ${totalOpen} abiertas`;
    const openBlocks = people.map(p=>{
      const list = vivas.filter(t=>t.responsable===p && t.estado!=='hecha').sort(sortByDeadline);
      if(!list.length) return '';
      return `<div class="group-label">${ava(p)} ${respLabel(p)} <span class="count">${list.length} abiertas</span></div>
              ${list.map(taskRow).join('')}`;
    }).join('');
    const done = vivas.filter(t=>t.estado==='hecha');
    c.innerHTML = (openBlocks||done.length) ? openBlocks + completedSection(done) : `<div class="empty">Sin tareas 🎉</div>`;
  }
}
// ─── ARCHIVO ───  (completadas con +5 días; siguen guardadas, solo se mueven acá)
function renderArchivo(c){
  document.getElementById('band-title').textContent='Archivo';
  const arch = tareas.filter(isArchived)
    .sort((a,b)=>String(b.completed_at||'').localeCompare(String(a.completed_at||'')));
  document.getElementById('band-meta').innerHTML =
    `<b>${arch.length}</b> tarea${arch.length===1?'':'s'} archivada${arch.length===1?'':'s'} · se mueven acá tras ${ARCHIVE_DIAS} días`;
  if(!arch.length){ c.innerHTML = `<div class="empty">Todavía no hay tareas archivadas 📦</div>`; return; }
  const mesDe = d => { try{ return new Date(d).toLocaleDateString('es-AR',{month:'long',year:'numeric'}); }catch(e){ return 'Sin fecha'; } };
  const groups = {};
  arch.forEach(t=>{ const k = t.completed_at?mesDe(t.completed_at):'Sin fecha'; (groups[k]=groups[k]||[]).push(t); });
  c.innerHTML = Object.entries(groups).map(([mes,list])=>
    `<div class="group-label done-label">📦 ${mes.charAt(0).toUpperCase()+mes.slice(1)} <span class="count">${list.length}</span></div>
     ${list.map(taskRow).join('')}`
  ).join('');
}

// ─── DASHBOARD ───
function toNum(d){ return d ? new Date(d+'T00:00:00').getTime() : null; }
function diffDays(a,b){ return Math.round((toNum(b)-toNum(a))/86400000); }

function fmtLargo(d){
  const [y,m,day]=d.split('-'); const mm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${mm[parseInt(m)-1]} ${y}`;
}
// Bloque comercial: SOLO datos reales del CRM (snapshot, no live). Sin inventar el resto.
function crmBlock(){
  return `<div class="sec-head">
      <span class="sec-title">Comercial</span>
      <span class="sec-note">Snapshot del CRM · ${fmtLargo(CRM.fecha)} · <a href="${CRM.url}" target="_blank" rel="noopener">abrir CRM ↗</a></span>
    </div>
    <div class="kpi-strip crm">
      <div class="kpi"><div class="kpi-label">Pipeline activo</div><div class="kpi-val">${CRM.pipeline}</div><div class="kpi-sub">total en gestión</div></div>
      <div class="kpi"><div class="kpi-label">Oportunidades activas</div><div class="kpi-val">${CRM.activas}</div><div class="kpi-sub">abiertas en el CRM</div></div>
      <div class="kpi"><div class="kpi-label">Por cerrar</div><div class="kpi-val" style="color:var(--gold-deep)">${CRM.porCerrar}</div><div class="kpi-sub">en etapa de cierre</div></div>
    </div>`;
}

function renderDashboard(c){
  document.getElementById('band-title').textContent='Dashboard';
  const abiertas = tareas.filter(t=>t.estado!=='hecha').length;
  const hechas = tareas.filter(t=>t.estado==='hecha').length;
  const vencidas = tareas.filter(t=>t.estado!=='hecha' && t.deadline && t.deadline<TODAY).length;
  const curso = tareas.filter(t=>t.estado==='en curso').length;
  const avanceGlobal = tareas.length ? Math.round(hechas/tareas.length*100) : 0;
  document.getElementById('band-meta').innerHTML = `<b>${avanceGlobal}%</b> completado · ${abiertas} abiertas`;

  const kpis = `<div class="kpi-strip">
    <div class="kpi"><div class="kpi-label">Avance global</div><div class="kpi-val">${avanceGlobal}%</div>
      <div class="kpi-bar"><span style="width:${avanceGlobal}%;background:var(--accent)"></span></div></div>
    <div class="kpi"><div class="kpi-label">Abiertas</div><div class="kpi-val">${abiertas}</div><div class="kpi-sub">${tareas.length} en total</div></div>
    <div class="kpi"><div class="kpi-label">En curso</div><div class="kpi-val" style="color:var(--blue)">${curso}</div><div class="kpi-sub">activas ahora</div></div>
    <div class="kpi"><div class="kpi-label">Vencidas</div><div class="kpi-val" style="color:${vencidas?'var(--danger)':'var(--accent)'}">${vencidas}</div><div class="kpi-sub">${vencidas?'requieren acción':'al día'}</div></div>
  </div>`;

  // agrupar por proyecto
  const proys = [...new Set(tareas.map(t=>t.proyecto||'Sin proyecto'))];
  const groups = proys.map(p=>{
    const list = tareas.filter(t=>(t.proyecto||'Sin proyecto')===p).sort(sortByDeadline);
    const done = list.filter(t=>t.estado==='hecha').length;
    const pct = Math.round(done/list.length*100);
    const team = [...new Set(list.map(t=>t.responsable))];
    const creados = list.map(t=>(t.created_at||'').slice(0,10)).filter(Boolean).sort();
    const inicio = creados[0] || list.find(t=>t.deadline)?.deadline || TODAY;
    const fechas = list.map(t=>t.deadline).filter(Boolean).sort();
    const fin = fechas.length ? fechas[fechas.length-1] : TODAY;
    const span = Math.max(diffDays(inicio,fin),1);
    let hoyPct = Math.min(Math.max(diffDays(inicio,TODAY)/span*100,0),100);
    const overdue = TODAY>fin && pct<100;
    const estadoTxt = pct===100?'Completo':(overdue?'Atrasado':(list.some(t=>t.estado==='en curso')?'En curso':'En agenda'));
    const estadoCls = pct===100?'hecha':(overdue?'esperando':(list.some(t=>t.estado==='en curso')?'curso':'pendiente'));
    const barColor = pct===100?'var(--accent)':(overdue?'var(--danger)':'var(--accent)');
    const hl = (highlightProy && highlightProy===p) ? 'hl' : '';

    const rows = list.map(t=>`<div class="d-row ${t.estado==='hecha'?'done':''}">
        <div class="d-cell d-task"><span class="d-dot ${ESTADO_CLASS[t.estado]}"></span>${t.titulo}</div>
        <div class="d-cell d-resp">${ava(t.responsable)}</div>
        <div class="d-cell d-fecha">${t.deadline?fmt(t.deadline):'—'}</div>
        <div class="d-cell"><span class="estado ${ESTADO_CLASS[t.estado]}" style="margin:0">${ESTADO_LABEL[t.estado]}</span></div>
      </div>`).join('');

    return `<div class="proy ${hl}">
      <div class="proy-head">
        <div class="proy-name"><span class="proy-bar-accent" style="background:${barColor}"></span>${p}</div>
        <div class="proy-team">${team.map(r=>ava(r)).join('')}</div>
        <span class="estado ${estadoCls}" style="margin:0">${estadoTxt}</span>
      </div>
      <div class="proy-metrics">
        <div class="metric">
          <div class="metric-top"><span>Avance</span><b>${pct}%</b></div>
          <div class="prog"><span style="width:${pct}%;background:${barColor}"></span></div>
        </div>
        <div class="metric">
          <div class="metric-top"><span>Tiempo · ${fmt(inicio)} → ${fmt(fin)}</span><b>${list.length} tareas</b></div>
          <div class="prog time"><span style="width:${hoyPct}%"></span><i class="hoy" style="left:${hoyPct}%" title="Hoy"></i></div>
        </div>
      </div>
      <div class="proy-rows">${rows}</div>
    </div>`;
  }).join('');

  const tareasHead = `<div class="sec-head spaced">
      <span class="sec-title">Tablero de tareas</span>
      <span class="sec-note"><span class="live">en vivo</span></span>
    </div>`;
  c.innerHTML = crmBlock() + focoBlock() + tareasHead + kpis + `<div class="proy-list">${groups}</div>`;
  if(highlightProy){ const el=c.querySelector('.proy.hl'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); highlightProy=null; }
}

// ─── FOCO DE HOY (las impostergables que vos elegís) ───
function focoScore(t){
  if(t.deadline && t.deadline < TODAY) return 1000 + diffDays(t.deadline,TODAY); // vencida: más atrasada, más arriba
  if(t.deadline === TODAY) return 500;                                            // vence hoy
  if(t.estado==='en curso') return 300;
  if(t.estado==='esperando respuesta') return 200;
  return 100;
}
function focoReason(t){
  if(t.deadline && t.deadline < TODAY){ const d=diffDays(t.deadline,TODAY);
    return {dot:'red',tag:'Vencida',tagc:'red',why:`Venció hace <b>${d} día${d>1?'s':''}</b>. Arrastrala y cerrala hoy.`}; }
  if(t.deadline===TODAY) return {dot:'amber',tag:'Vence hoy',tagc:'amber',why:`Tiene fecha <b>hoy</b>. Si no sale hoy, mañana ya arrastra.`};
  if(t.estado==='en curso') return {dot:'blue',tag:'En curso',tagc:'blue',why:`Ya está arrancada y <b>sin fecha de cierre</b>. Definí el próximo paso.`};
  if(t.estado==='esperando respuesta') return {dot:'amber',tag:'Esperando',tagc:'amber',why:`<b>Esperando respuesta</b>. Un recordatorio breve la reactiva.`};
  return {dot:'gray',tag:'Pendiente',tagc:'gray',why:`Sin fecha asignada. Ponele un día para que no flote.`};
}
function focoBlock(){
  const open = tareas.filter(t=>t.estado!=='hecha');
  const inFoco = open.filter(t=>t.en_foco).sort((a,b)=>focoScore(b)-focoScore(a)).slice(0,focoCap);
  const slots = focoCap - inFoco.length;
  const sugeridas = slots>0 ? open.filter(t=>!t.en_foco).sort((a,b)=>focoScore(b)-focoScore(a)).slice(0, slots+2) : [];

  const cards = inFoco.map(t=>{
    const r=focoReason(t);
    const carry = (t.deadline && t.deadline<TODAY) ? `<span class="foco-carry">arrastrada</span>` : '';
    return `<div class="foco-card" id="fc${t.id}">
      <div class="foco-dot ${r.dot}"></div>
      <div class="foco-body">
        <div class="foco-title-row"><span class="foco-title">${t.titulo}</span><span class="foco-tag ${r.tagc}">${r.tag}</span>${carry}</div>
        <div class="foco-why">${r.why}</div>
        <div class="foco-meta">${ava(t.responsable)}<span class="foco-proj">${t.proyecto||'Sin proyecto'}</span></div>
      </div>
      <div class="foco-actions">
        <button class="x-foco" title="Quitar del foco" onclick="quitarFoco('${t.id}')">✕</button>
        <button class="btn-done" onclick="focoDone('${t.id}')">✓ Hecha</button>
      </div>
    </div>`;
  }).join('');

  let sugg='';
  if(slots>0 && sugeridas.length){
    const rows = sugeridas.map(t=>{ const r=focoReason(t);
      return `<div class="sugg-row">
        <span class="foco-dot ${r.dot}" style="width:9px;height:9px;margin:0"></span>
        <span class="sugg-title">${t.titulo}</span>
        <span class="foco-tag ${r.tagc}">${r.tag}</span>
        ${ava(t.responsable)}
        <button class="btn-sumar" onclick="sumarFoco('${t.id}')">+ Sumar</button>
      </div>`; }).join('');
    sugg = `<div class="foco-sugg">
      <div class="foco-sugg-head">💡 Te queda${slots>1?'n':''} ${slots} lugar${slots>1?'es':''} — elegí cuáles sumás a tu foco</div>
      ${rows}</div>`;
  }
  const body = (inFoco.length||sugeridas.length)
    ? cards+sugg
    : `<div class="foco-empty">No tenés tareas abiertas. Estás al día 🎉</div>`;

  return `<div class="foco">
    <div class="foco-head">
      <span class="foco-eyebrow"><span class="ico">🎯</span> Foco de hoy</span>
      <span class="foco-pill">${inFoco.length}/${focoCap} elegidas</span>
      <div class="foco-cap">
        <button class="${focoCap===3?'active':''}" onclick="setFocoCap(3)">3</button>
        <button class="${focoCap===5?'active':''}" onclick="setFocoCap(5)">5</button>
      </div>
    </div>
    ${body}
  </div>`;
}
function setFocoCap(n){ focoCap=n; localStorage.setItem('foco_cap',n); render(); }
async function setFoco(id,val){
  const t=tareas.find(x=>String(x.id)===String(id)); if(!t) return;
  t.en_foco=val; render();
  if(DEMO) return;
  const { error } = await _sb.from('tareas').update({ en_foco:val }).eq('id',id);
  if(error){ console.error('setFoco:', error); await loadTareas(); }
}
function sumarFoco(id){ setFoco(id,true); }
function quitarFoco(id){ setFoco(id,false); }
async function focoDone(id){
  const el=document.getElementById('fc'+id); if(el) el.classList.add('gone');
  const t=tareas.find(x=>String(x.id)===String(id)); if(!t) return;
  t.estado='hecha'; t.completed_at=new Date().toISOString();
  setTimeout(render,260);
  if(DEMO) return;
  const { error } = await _sb.from('tareas').update({ estado:'hecha', completed_at:t.completed_at }).eq('id',id);
  if(error){ console.error('focoDone:', error); await loadTareas(); }
}

function sortByDeadline(a,b){
  if(!a.deadline) return 1; if(!b.deadline) return -1; return a.deadline<b.deadline?-1:1;
}
function setView(v){
  view=v;
  document.getElementById('t-dia').classList.toggle('active',v==='dia');
  document.getElementById('t-persona').classList.toggle('active',v==='persona');
  document.getElementById('t-dash').classList.toggle('active',v==='dash');
  document.getElementById('t-archivo').classList.toggle('active',v==='archivo');
  const noAdd = (v==='dash'||v==='archivo');
  document.querySelector('.quickadd').style.display = noAdd ? 'none' : 'flex';
  document.querySelector('.qa-hint').style.display = noAdd ? 'none' : 'flex';
  render();
}
async function toggleDone(id){
  const t=tareas.find(x=>String(x.id)===String(id));
  if(!t) return;
  const completar = t.estado!=='hecha';
  if(completar){
    // flash de ~1s tachada/resaltada antes de bajar a Completadas
    const row=document.querySelector(`.task[data-id="${String(id).replace(/"/g,'\\"')}"]`);
    if(row){ row.classList.add('completing'); await new Promise(r=>setTimeout(r,950)); }
    t.estado='hecha'; t.completed_at=new Date().toISOString();
  } else {
    t.estado='pendiente'; t.completed_at=null;
  }
  render();                                           // optimista
  if(DEMO) return;
  const { error } = await _sb.from('tareas').update({ estado:t.estado, completed_at:t.completed_at }).eq('id',id);
  if(error){ console.error('toggleDone:', error); await loadTareas(); }
}
async function addTask(){
  const inp=document.querySelector('.qa-title');
  const titulo=inp.value.trim();
  if(!titulo) return;
  const resp=document.getElementById('qa-resp').value;
  const date=document.getElementById('qa-date').value || null;
  const go=document.querySelector('.qa-go'); go.disabled=true;
  const fila={ titulo, responsable:resp, deadline:date, estado:'pendiente', origen:'manual', es_mia: resp==='yo', proyecto:null, en_foco:false, notas:null };
  if(DEMO){ fila.id=Date.now(); tareas.unshift(fila); inp.value=''; document.getElementById('qa-date').value=''; go.disabled=false; inp.focus(); render(); return; }
  const { data, error } = await _sb.from('tareas').insert(fila).select().single();
  go.disabled=false;
  if(error){ console.error('addTask:', error); alert('No se pudo guardar la tarea:\n'+(error.message||error.code||'')); return; }
  tareas.unshift(data);
  inp.value=''; document.getElementById('qa-date').value='';
  inp.focus(); render();
}

_sb.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_IN') initApp(); });
initApp();
</script>
